name: Build UniTool

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            binary: dist/UniTool-linux
          - os: macos-latest
            platform: macos
            binary: dist/UniTool-macos
          - os: windows-latest
            platform: windows
            binary: dist/UniTool.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Generate icon.png (if missing)
        run: |
          python -c "
          import os
          if not os.path.exists('icon.png'):
              from PIL import Image
              Image.open('icon.ico').save('icon.png', 'PNG')
              print('icon.png created')
          else:
              print('icon.png already exists')
          "

      - name: Build with PyInstaller
        run: pyinstaller UniTool.spec --noconfirm

      # ── Windows code signing (optional) ───────────────────────────────────
      # The unsigned exe triggers SmartScreen "Windows protected your PC /
      # unknown publisher". The ONLY real fix is an Authenticode signature.
      # When you have a certificate, uncomment ONE option below.
      #
      # Option A — PFX / OV certificate via signtool. Store the cert as a
      # base64 string and its password in repo secrets:
      #   WINDOWS_CERT_BASE64   (base64 of your .pfx)
      #   WINDOWS_CERT_PASSWORD
      # - name: Sign Windows binary
      #   if: runner.os == 'Windows'
      #   shell: pwsh
      #   run: |
      #     $pfx = Join-Path $env:RUNNER_TEMP 'cert.pfx'
      #     [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
      #     $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
      #                  Sort-Object FullName -Descending | Select-Object -First 1).FullName
      #     & $signtool sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd SHA256 `
      #         /tr http://timestamp.digicert.com /td SHA256 dist\UniTool.exe
      #     & $signtool verify /pa dist\UniTool.exe
      #   env:
      #     WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      #     WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      #
      # Option B — Azure Trusted Signing (~$10/mo, recommended; builds
      # SmartScreen reputation quickly):
      # - name: Sign Windows binary
      #   if: runner.os == 'Windows'
      #   uses: azure/trusted-signing-action@v0
      #   with:
      #     azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
      #     endpoint: ${{ secrets.AZURE_TS_ENDPOINT }}
      #     trusted-signing-account-name: ${{ secrets.AZURE_TS_ACCOUNT }}
      #     certificate-profile-name: ${{ secrets.AZURE_TS_PROFILE }}
      #     files-folder: dist
      #     files-folder-filter: exe

      - name: Rename binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: mv dist/UniTool ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniTool-${{ matrix.platform }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Publish checksums so users can verify the (currently unsigned) binaries.
      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          echo "----- SHA256SUMS.txt -----"
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
