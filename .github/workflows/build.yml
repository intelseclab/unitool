name: Build UniTool

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            binary: dist/UniTool-linux
          - os: macos-latest
            platform: macos
            binary: dist/UniTool-macos
          - os: windows-latest
            platform: windows
            binary: dist/UniTool.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Generate icon.png (if missing)
        run: |
          python -c "
          import os
          if not os.path.exists('icon.png'):
              from PIL import Image
              Image.open('icon.ico').save('icon.png', 'PNG')
              print('icon.png created')
          else:
              print('icon.png already exists')
          "

      - name: Build with PyInstaller
        run: pyinstaller UniTool.spec --noconfirm

      - name: Rename binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: mv dist/UniTool ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniTool-${{ matrix.platform }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
