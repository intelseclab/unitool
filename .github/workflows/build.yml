name: Build UniTool

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: read
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Create or update tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "v${{ steps.read.outputs.version }}"
          git push origin "v${{ steps.read.outputs.version }}" --force

  build:
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            binary: dist/UniTool-linux
          - os: macos-latest
            platform: macos
            binary: dist/UniTool-macos
          - os: windows-latest
            platform: windows
            binary: dist/UniTool.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Generate icon.png (if missing)
        run: |
          python -c "
          import os
          if not os.path.exists('icon.png'):
              from PIL import Image
              Image.open('icon.ico').save('icon.png', 'PNG')
              print('icon.png created')
          else:
              print('icon.png already exists')
          "

      - name: Build with PyInstaller
        run: pyinstaller UniTool.spec --noconfirm

      - name: Rename binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: mv dist/UniTool ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniTool-${{ matrix.platform }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.tag.outputs.version }}
          name: UniTool v${{ needs.tag.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
